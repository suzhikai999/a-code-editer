function Init(){

function loop(){
    mousexf=mousex-mousexf;
    mouseyf=mousey-mouseyf;
    frameCount++;
    const currentTime=performance.now();
    const deltaTime=currentTime-lastTime;
    if(frameCount>=10){
        fps=Math.round(10*1000.0/deltaTime*100)/100;
        frameCount=0,lastTime=currentTime;}
    unit[0].type="main";
    if(CLFC<=0)cursorLook=cursorLook==' ' ? '⎸' :' ',CLFC=30;else CLFC--;
    if(!dragUnit&&mousedown)cam.x-=mousexf,cam.y-=mouseyf;
    if(dragUnit&&key.Shift)dragUnit.x+=mousexf,dragUnit.y+=mouseyf;
    if(filler.length==1&&filler[0].text.length==fillerPos)filler=filler[0].has,fillerPos=0;
    ctx.fillStyle="#fff";
    ctx.fillRect(0,0,W,H);
    ctx.save();
    for(const u of unit){
        const p=getPos(u);
        let i=0;
        for(const u2 of u.to){
            const p2=getPos(u2);
            ctx.beginPath();
            ctx.moveTo((p.x+p.endx)/2,p.y+20);
            ctx.lineTo((p2.x+p2.endx)/2,p2.y+20);
            ctx.fillStyle="#999";
            ctx.strokeStyle="#000";
            ctx.stroke();
            ctx.beginPath();
            const o={x:(p.x+p.endx)/2,y:p.y+20};
            const o2={x:(p2.x+p2.endx)/2,y:p2.y+20};
            const temlen=Math.hypot(o.x-o2.x,o.y-o2.y);
            const temlen2=p.endx-o.x+23;
            const temp={x:(o2.x-o.x)/temlen,y:(o2.y-o.y)/temlen};
            ctx.moveTo(o.x+temp.x*temlen2+temp.y*10,o.y+temp.y*temlen2-temp.x*10);
            ctx.lineTo(o.x+temp.x*temlen2-temp.y*10,o.y+temp.y*temlen2+temp.x*10);
            ctx.lineTo(o.x+temp.x*(temlen2+10),     o.y+temp.y*(temlen2+10));
            ctx.fill();
            if(i==0);else
            if(i===1)show(lanw.else,o.x+temp.x*temlen2,o.y+temp.y*temlen2+20);
            else show(lanw.case+`${i}`,o.x+temp.x*temlen2,o.y+temp.y*temlen2+20);
            i++;
        }
    }

    for(const u of unit){

        ctx.fillStyle="#e0e0e0";
        ctx.strokeStyle="#999";
        ctx.lineWidth=2;
        ctx.beginPath();
        const r=8;
        ctx.roundRect(p.x,p.y,p.endx-p.x+20,40,r);
        ctx.fill();
        const end=show(u,p.x+20,p.y+20)+cam.x;
        u.endx=end;
        if(u.type=="if"&&u.to.length==0)u.type="void";
        let i=0;
        for(const u2 of u.to){
            if(!unit.includes(u2))u.to.splice(i,1);
            if(u2.x>u.x&&u.y>u2.y-50&&u.y<u2.y+50&&u2.x<end+50)u2.x=end+50;
           ++i;}
    }
    addFiller=[...globalObj,...staticFiller];
    if(mousedown&&dragUnit){if(cursorAt=="un"){cursorAt=cursorWA,CLFC=0,cursorLook=' ';if(cursorAt>dragUnit.val.length)cursorAt=dragUnit.val.length;}
        SeCus=cursorWA;if(SeCus>dragUnit.val.length)SeCus=dragUnit.val.length;if(SeCus==cursorAt)SeCus=-1;}

    ctx.font="18px sans-serif";
    ctx.fillStyle="#000";
    ctx.textAlign="left";
    ctx.textBaseline="alphabetic";
    ctx.fillText(`FPS:${fps}`,12,24);
    ctx.restore();
    if(find(mousex,mousey)){
        if(key.Shift)canvas.style.cursor="grabbing";
        else canvas.style.cursor="text";
    }else{canvas.style.cursor=mousedown?"grabbing":"grab";}
    mousexf=mousex;
    mouseyf=mousey;
    requestAnimationFrame(loop);

const SAVE_KEY="flow_editor_saves";
function getSaves(){
    const raw=localStorage.getItem(SAVE_KEY);
    return raw?JSON.parse(raw):[];
}
function saveCurrentUnit(){
    const saves=getSaves();
    const unitCopy=[];
    for(const u of unit){
        const indexArr=[];
        for(const targetObj of u.to){
            const realIdx=targetObj.POS;
            indexArr.push(realIdx);
        }
        unitCopy.push({x:u.x,y:u.y,val:u.val,type:u.type,to:indexArr});
    }
    saves.push({
        time:new Date().toLocaleString(),
        data:JSON.parse(JSON.stringify(unitCopy))
    });
    localStorage.setItem(SAVE_KEY, JSON.stringify(saves));
    renderSaveList();
    _runner._log.innerText+=`\n⎗ 已保存副本，当前共${saves.length}份存档`;
}
function loadSave(index){
    const saves=getSaves();
    if(!saves[index])return;
    const saveData=JSON.parse(JSON.stringify(saves[index].data));
    unit=saveData;
    for(const u of unit){
        for(let i=0;i<u.to.length;++i){
            u.to[i]=unit[u.to[i]];
        }}
    cam.x=0,cam.y=0;
    _runner._log.innerText+=`\n⎘ 已加载存档 #${index+1}`;
}
function renderSaveList(){
    const listDom=document.getElementById("saveList");
    const saves=getSaves();
    if(saves.length===0){
        listDom.innerHTML="<p style='color:#666;font-size:14px;'>暂无存档</p>";
        return;}
    let html="";
    saves.forEach((save, idx)=>{
        html+=`
        <div style="padding:8px 10px;border:1px solid #dde4f2;border-radius:6px;margin-bottom:8px;cursor:pointer;"
             onclick="loadSave(${idx})">
            <div style="font-weight:bold;font-size:14px;">存档 #${idx+1}</div>
            <div style="font-size:12px;color:#666;">${save.time}</div>
            <div style="font-size:12px;color:#666;">节点数:${save.data.length}</div>
        </div>
        `;
    });
    listDom.innerHTML=html;
}
function safeEscape(str) {
    let Str="";
    for(let i=0;i<str.length;++i){
        if(str[i]=="\\"){
            Str+="\\";
        }else
        if(str[i]=="'"||str[i]=='"'){
            Str+="\\";
        }
        Str+=str[i];
    }
    return Str;
}
