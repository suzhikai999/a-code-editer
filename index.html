const cMain=document.getElementById('colorMain');
const cCtx=cMain.getContext('2d');
const cHue=document.getElementById('colorHue');
const cText=document.getElementById('colorText');
const colorPanel={cw:cMain.width,ch:cMain.height,choosingPlace:{x:1,y:1}};
function hwbToRgb(h,w,b){
    h=((h%360)+360)%360/360;
    if(w+b>=1){
        const gray=w/(w+b);
        const val=Math.round(gray*255);
        return [val,val,val];
    }
    const v=1-b;
    const s=1-w/v;
    let r,g,bl;
    const i=Math.floor(h*6);
    const f=h*6-i;
    const p=v*(1-s);
    const q=v*(1-s*f);
    const t=v*(1-s*(1-f));
    switch(i%6){
        case 0:r=v;g=t;bl=p;break;
        case 1:r=q;g=v;bl=p;break;
        case 2:r=p;g=v;bl=t;break;
        case 3:r=p;g=q;bl=v;break;
        case 4:r=t;g=p;bl=v;break;
        case 5:r=v;g=p;bl=q;break;
    }
    return [Math.round(r*255),Math.round(g*255),Math.round(bl*255)];
}
function drawColorBox(){
    const img=cCtx.createImageData(colorPanel.cw,colorPanel.ch);
    cUpdatePreview();
    for(let y=0;y<colorPanel.ch;y++){
        for(let x=0;x<colorPanel.cw;x++){
            const i=(y*colorPanel.cw+x)*4;
            let [r,g,b]=hwbToRgb(currentHue,(1-x/colorPanel.cw)*(1-y/colorPanel.ch),y/colorPanel.ch);
            if(Math.abs(Math.pow(x/colorPanel.cw-colorPanel.choosingPlace.x,2)+
                        Math.pow(y/colorPanel.ch-colorPanel.choosingPlace.y,2)-0.0008)<0.0004){[r,g,b]=[255-r,255-g,255-b];}
            img.data[i]=r;img.data[i+1]=g;img.data[i+2]=b;img.data[i+3]=255;
        }
    }
    cCtx.putImageData(img,0,0);
}
function cUpdatePreview(){
    const x=colorPanel.choosingPlace.x,y=colorPanel.choosingPlace.y;
    const [r,g,b]=hwbToRgb(currentHue,(1-x)*(1-y),y);
    currentColor={r:r,g:g,b:b};
    cText.textContent=`rgb(${r},${g},${b})`;
    cText.style.background=`rgb(${r},${g},${b})`;
    if(r+g+b>377)cText.style.color=`#000`;
    else cText.style.color=`#fff`;
}
cHue.onmousemove=function(e){if(!mousedown)return;cHue.onmousedown(e);};
cHue.onmousedown=(e)=>{
    const rect=cHue.getBoundingClientRect();
    currentHue=360*(e.clientY-rect.top)/rect.height;
    drawColorBox();
};
cMain.onmousemove=function(e){if(!mousedown)return;cMain.onmousedown(e);};
cMain.onmousedown=(e)=>{
    const rect=cMain.getBoundingClientRect();
    const x=(e.clientX-rect.left)*1.57/colorPanel.cw;
    const y=(e.clientY-rect.top)/1.339/colorPanel.ch;
    colorPanel.choosingPlace={x:x,y:y};
    drawColorBox();
};
drawColorBox();
const SAVE_KEY="flow_editor_saves";
function getSaves(){
    const raw=localStorage.getItem(SAVE_KEY);
    return raw?JSON.parse(raw):[];
}
function UnitToJSON(){
    const unitCopy=[];
    for(const u of unit){
        const indexArr=[];
        for(const targetObj of u.to){
            const realIdx=targetObj.POS;
            indexArr.push(realIdx);
        }
        unitCopy.push({x:u.x,y:u.y,val:u.val,type:u.type,to:indexArr});
    }
    return unitCopy;
}
function TakeJSON(){
    const htmlContent=JSON.stringify([UnitToJSON(),domHtmlInput.value]);
    const blob=new Blob([htmlContent],{type:'text/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='test.json';
    a.click();
    URL.revokeObjectURL(url);
}
function LoadJSON(){
    const fileInput=document.getElementById('jsonFileInput');
    fileInput.onchange=function(e){
        const file=e.target.files[0];
        if(!file)return;
        const reader=new FileReader();
        reader.onload=function(res){
            try{
                const data=JSON.parse(res.target.result);
                if(!Array.isArray(data)||data.length!==2||!Array.isArray(data[0])){
                    throw new Error("文件不是编辑器导出的JSON");
                }
                const nodeArr=data[0];
                const domStr=data[1];
                unit=nodeArr;
                for(const u of unit){u.to=u.to.map(idx=>unit[idx]);}
                domHtmlInput.value=domStr;
                cam.x=0;
                cam.y=0;
                _runner._log.innerText+=`\n⎙ JSON加载完成，已自动应用画布与DOM`;
                _runner._log.scrollTop=_runner._log.scrollHeight;
                fileInput.value='';
            }catch(err){
                alert("加载失败："+err.message);
                _runner._log.innerText+=`\n⚠ 加载异常：${err.message}`;
                _runner._log.scrollTop=_runner._log.scrollHeight;
                fileInput.value='';
            }
        }
        reader.readAsText(file);
    }
    fileInput.click();
}
function saveCurrentUnit(){
    const saves=getSaves();
    saves.push({
        time:new Date().toLocaleString(),
        data:JSON.parse(JSON.stringify([UnitToJSON(),domHtmlInput.value,`存档#${saves.length+1}`]))
    });
    localStorage.setItem(SAVE_KEY,JSON.stringify(saves));
    renderSaveList();
    _runner._log.innerText+=`\n⎗ 已保存副本，当前共${saves.length}份存档`;
    _runner._log.scrollTop=_runner._log.scrollHeight;
}
function loadSave(index){
    const saves=getSaves();
    if(!saves[index])return;
    const saveData=JSON.parse(JSON.stringify(saves[index].data));
    unit=saveData[0];
    for(const u of unit){
        for(let i=0;i<u.to.length;++i){
            u.to[i]=unit[u.to[i]];
        }}
    cam.x=0,cam.y=0;
    domHtmlInput.value=saveData[1];
    _runner._log.innerText+=`\n⎘ 已加载 ${saveData[2]}`;
    _runner._log.scrollTop=_runner._log.scrollHeight;
}
function deleteSave(index){
    if(!confirm("确定删除该存档？"))return;
    const saves=getSaves();
    _runner._log.innerText+=`\n🗑 已删除 ${saves[index].data[2]}`;
    _runner._log.scrollTop=_runner._log.scrollHeight;
    saves.splice(index,1);
    localStorage.setItem(SAVE_KEY,JSON.stringify(saves));
    renderSaveList();
}
function renameSave(index){
    const saves=getSaves();
    const text=prompt(`命名为:`,saves[index].data[2]);
    if(!text)return;
    saves[index].data[2]=text;
    localStorage.setItem(SAVE_KEY,JSON.stringify(saves));
    renderSaveList();
    _runner._log.innerText+=`\n🖎 已命名为 ${text}`;
    _runner._log.scrollTop=_runner._log.scrollHeight;
}
function renderSaveList(){
    const listDom=document.getElementById("saveList");
    const saves=getSaves();
    if(saves.length===0){
        listDom.innerHTML="<p style='color:#666;font-size:14px;'>暂无存档</p>";
        return;}
    let html="";
    saves.forEach((save,idx)=>{
        html+=`
        <div style="position:relative;padding:8px 10px;border:1px solid #dde4f2;border-radius:6px;margin-bottom:8px;cursor:pointer;" onclick="loadSave(${idx})">
            <button class="del-save-btn" onclick="event.stopPropagation();deleteSave(${idx})">🗙</button>
            <button class="del-alter-btn" onclick="event.stopPropagation();renameSave(${idx})">🖎</button>
            <div style="font-weight:bold;font-size:14px;">${save.data[2]}</div>
            <div style="font-size:12px;color:#666;">${save.time}</div>
            <div style="font-size:12px;color:#666;">节点数:${save.data[0].length}</div>
        </div>
        `;
    });
    listDom.innerHTML=html;
}
function UnitToHtml(){
    let str="",Str="",mainPOS=0;
    for(const u of unit){
        if(u.type=='function'){
            const temp2=u.val.indexOf('('),temp3=u.val.trim().slice(temp2+1,-1);
            let STR='',word='';
            for(let i=0;i<temp3.length;++i){
                if(Chars.includes(temp3[i])){
                    word+=temp3[i];
                }else{if(word.length>0)STR+='_runner.'+word+'='+word+';';word="";}
            }
            if(word.length>0)STR+='_runner.'+word+'='+word+';';
            Str+=`

_runner.${u.val.slice(0,temp2)}=function(${temp3}){
    ${STR}
    var now=unit[${u.POS}];
    _runner._res=null;
    while(true){
        var temp=now.fu();
        if(now.to.length==0){
            break;
        }else{
            now=unit[now.to[temp]];
        }
    }
    return _runner._res;
};

`;
            str+=`{type:\"void\",fu:function(){return 0;},to:[`;
            for(const u2 of u.to){
                str+=`${u2.POS},`;
            }
            str+=`]},\n`;
        }else if(u.type=='void'||u.type=='if'){
            if(u.val.includes("wait")){
                str+=`{type:\"void\",fu:function(){setTimeout(function(){RunFrom(unit[${u.to[0].POS}]);return;},${u.val.trim().slice(5,-1)});return 0;},to:[]},\n`;
            }else{
                str+=`{type:\"void\",fu:function(){${u.Fu}},to:[`;
                for(const u2 of u.to){
                    str+=`${u2.POS},`;
                }
                str+=`]},\n`;
            }
        }else if(u.type=='main'){
            mainPOS=u.POS;
            str+=`{type:\"void\",fu:function(){return 0;},to:[`;
            for(const u2 of u.to){
                str+=`${u2.POS},`;
            }
            str+=`]},\n`;
        }
    }
    const htmlContent=`
<html onclick="_runner.onclick(event)" onmousemove="_runner.onmousemove(event)" onmousedown="_runner.onmousedown(event)" onmouseup="_runner.onmouseup(event)" onmousewheel="_runner.onmousewheel(event)" oncontextmenu="_runner.oncontextmenu(event)">
    <head>
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta charset="UTF-8">
        <title>TEST</title>
    </head>
    <body>
        <div id="runner_log"></div>
        ${domHtmlInput.value}
    </${"body"}>
    <script>

var _runner={
    _log:document.getElementById("runner_log"),
    _res:null,
    onclick:function(event){return ;},
    onmousemove:function(event){return ;},
    onmousedown:function(event){return ;},
    onmouseup:function(event){return ;},
    onmousewheel:function(event){return ;},
    onbeforeunload:function(event){return ;},
    oncontextmenu:function(event){return ;}
};
${Str}
var unit=[
    ${str}
];
function RunFrom(now){
    while(true){
        var temp=now.fu();
        if(now.to.length==0){
            break;
        }else{
            now=unit[now.to[temp]];
        }
    }
}
RunFrom(unit[${mainPOS}]);

    </${"script"}>
</html>`;
    return htmlContent;
}
function Download(){
    const htmlContent=UnitToHtml();
    const blob=new Blob([htmlContent],{type:'text/hta'});
    const url=URL.createObjectURL(blob);
